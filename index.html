<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo Card Stage 1</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<main>
  <article data-testid="test-todo-card" class="todo-card">

    <!-- TOP -->
    <div class="top">
      <h2 data-testid="test-todo-title" id="todo-title">Finish UI Design</h2>

      <input type="checkbox"
        data-testid="test-todo-complete-toggle"
        aria-labelledby="todo-title"
      />
    </div>

    <!-- DESCRIPTION -->
    <div data-testid="test-todo-collapsible-section" id="descBox" class="collapsed">
      <p data-testid="test-todo-description">
        Complete the full UI/UX design for the AI writing assistant 
        homepage including mobile responsiveness and testing.
      </p>
    </div>

    <button
      data-testid="test-todo-expand-toggle"
      aria-expanded="false"
      aria-controls="descBox"
      id="expandBtn"
    >Show more</button>

    <!-- META -->
    <div class="meta">

      <span data-testid="test-todo-priority-indicator" id="priorityIndicator"></span>

      <span data-testid="test-todo-priority" id="priorityText">High</span>

      <select data-testid="test-todo-status-control" id="statusControl">
        <option>Pending</option>
        <option>In Progress</option>
        <option>Done</option>
      </select>

      <span data-testid="test-todo-status" id="statusText">Pending</span>

    </div>

    <!-- TIME -->
    <time data-testid="test-todo-due-date" id="dueDate"
      datetime="2026-03-01T18:00:00Z">
      Due March 1, 2026
    </time>

    <div data-testid="test-todo-time-remaining" id="timeRemaining" aria-live="polite"></div>

    <div data-testid="test-todo-overdue-indicator" id="overdueIndicator"></div>

    <!-- TAGS -->
    <ul data-testid="test-todo-tags" class="tags">
      <li data-testid="test-todo-tag-work">work</li>
      <li data-testid="test-todo-tag-urgent">urgent</li>
    </ul>

    <!-- ACTIONS -->
    <div class="actions">
      <button data-testid="test-todo-edit-button" id="editBtn">Edit</button>
      <button data-testid="test-todo-delete-button">Delete</button>
    </div>

    <!-- EDIT FORM -->
    <form data-testid="test-todo-edit-form" id="editForm" class="hidden">

      <label>Title</label>
      <input data-testid="test-todo-edit-title-input" id="editTitle"/>

      <label>Description</label>
      <textarea data-testid="test-todo-edit-description-input" id="editDesc"></textarea>

      <label>Priority</label>
      <select data-testid="test-todo-edit-priority-select" id="editPriority">
        <option>Low</option>
        <option>Medium</option>
        <option>High</option>
      </select>

      <label>Due Date</label>
      <input type="datetime-local"
        data-testid="test-todo-edit-due-date-input"
        id="editDate"
      />

      <div class="actions">
        <button type="button" data-testid="test-todo-save-button" id="saveBtn">Save</button>
        <button type="button" data-testid="test-todo-cancel-button" id="cancelBtn">Cancel</button>
      </div>

    </form>

  </article>
</main>

<script src="script.js"></script>
</body>
</html>
